<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Taşıburadan | Yakında Başlıyoruz</title>
  <meta name="description" content="Taşıburadan yakında başlıyor. Nakliyede yeni nesil deneyim." />
  <meta name="theme-color" content="#dff4ff" />

  <style>
    :root {
      --blue-900: #0b2f8f;
      --blue-800: #155bd8;
      --blue-700: #1f6ff2;
      --cyan-600: #08aeea;
      --cyan-400: #38d4ff;
      --text: #0f172a;
      --muted: #475569;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      background: #dff4ff;
      color: var(--text);
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(rgba(84, 169, 230, .14) 1px, transparent 1px),
        linear-gradient(90deg, rgba(84, 169, 230, .14) 1px, transparent 1px),
        radial-gradient(circle at 18% 20%, rgba(97, 218, 255, .34), transparent 32%),
        radial-gradient(circle at 84% 16%, rgba(255, 255, 255, .72), transparent 36%),
        radial-gradient(circle at 50% 92%, rgba(94, 194, 255, .22), transparent 34%),
        linear-gradient(135deg, #c9f0ff 0%, #dff5ff 42%, #f4fbff 100%);
      background-size:
        32px 32px,
        32px 32px,
        auto,
        auto,
        auto,
        auto;
    }

    /* Fotoğraftaki gibi açık mavi grid arka plan + hafif canlı wallpaper hareketi */
    .animated-bg {
      position: absolute;
      inset: -18%;
      z-index: -4;
      background:
        radial-gradient(circle at 28% 30%, rgba(56, 212, 255, .30), transparent 28%),
        radial-gradient(circle at 70% 28%, rgba(31, 111, 242, .12), transparent 28%),
        radial-gradient(circle at 50% 74%, rgba(255, 255, 255, .58), transparent 32%);
      filter: blur(8px);
      animation: softMove 16s ease-in-out infinite alternate;
    }

    .animated-bg::before,
    .animated-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        conic-gradient(from 90deg at 50% 50%,
          transparent 0deg,
          rgba(255,255,255,.24) 70deg,
          rgba(56,212,255,.18) 135deg,
          transparent 205deg,
          rgba(31,111,242,.10) 280deg,
          transparent 360deg);
      animation: slowRotate 34s linear infinite;
      opacity: .78;
    }

    .animated-bg::after {
      animation-duration: 46s;
      animation-direction: reverse;
      opacity: .52;
    }

    @keyframes softMove {
      0% {
        transform: translate3d(-2%, -1%, 0) scale(1);
      }
      100% {
        transform: translate3d(2%, 1.5%, 0) scale(1.06);
      }
    }

    @keyframes slowRotate {
      to {
        transform: rotate(360deg);
      }
    }

    .grid-glow {
      position: absolute;
      inset: 0;
      z-index: -3;
      background:
        linear-gradient(rgba(59, 130, 246, .085) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, .085) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(circle at center, black 0%, black 70%, transparent 96%);
      animation: gridDrift 12s linear infinite;
    }

    @keyframes gridDrift {
      from {
        background-position: 0 0, 0 0;
      }
      to {
        background-position: 32px 32px, 32px 32px;
      }
    }

    .shine {
      position: absolute;
      inset: 0;
      z-index: -2;
      background: linear-gradient(110deg,
        transparent 0%,
        transparent 34%,
        rgba(255,255,255,.32) 48%,
        transparent 62%,
        transparent 100%);
      transform: translateX(-120%);
      animation: shinePass 7s ease-in-out infinite;
    }

    @keyframes shinePass {
      0%, 18% {
        transform: translateX(-120%);
      }
      52% {
        transform: translateX(120%);
      }
      100% {
        transform: translateX(120%);
      }
    }

    .content {
      width: min(980px, 100%);
      display: grid;
      justify-items: center;
      text-align: center;
      padding: 52px 24px;
    }

    .logo {
      width: clamp(178px, 22vw, 288px);
      height: auto;
      display: block;
      margin-bottom: 28px;
      user-select: none;
      filter:
        drop-shadow(0 18px 34px rgba(21, 91, 216, .18))
        drop-shadow(0 0 22px rgba(56, 212, 255, .24));
      animation: logoFloat 5s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    .title {
      margin: 0;
      font-size: clamp(48px, 8vw, 108px);
      line-height: .92;
      letter-spacing: -.08em;
      font-weight: 950;
      color: #142033;
      text-shadow:
        0 10px 26px rgba(20, 32, 51, .14),
        0 1px 0 rgba(255,255,255,.78);
    }

    .title span {
      color: #142033;
      background: none;
      -webkit-background-clip: initial;
      background-clip: initial;
    }

    .divider {
      width: min(280px, 46vw);
      height: 5px;
      margin: 28px 0 22px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, #155bd8, #38d4ff, transparent);
      box-shadow: 0 12px 28px rgba(8, 174, 234, .22);
      opacity: .9;
    }

    .slogan {
      margin: 0;
      font-size: clamp(22px, 3.4vw, 42px);
      line-height: 1.12;
      letter-spacing: -.045em;
      font-weight: 850;
      color: #1e3a5f;
      text-shadow: 0 1px 0 rgba(255,255,255,.85);
    }

    .slogan strong {
      color: var(--cyan-600);
      font-weight: 950;
    }

    @media (max-width: 680px) {
      .page {
        padding: 22px;
        background-size:
          26px 26px,
          26px 26px,
          auto,
          auto,
          auto,
          auto;
      }

      .grid-glow {
        background-size: 26px 26px;
      }

      .content {
        padding: 32px 0;
      }

      .logo {
        width: 190px;
        margin-bottom: 22px;
      }

      .title {
        font-size: clamp(50px, 16vw, 80px);
      }

      .slogan {
        font-size: clamp(24px, 7.5vw, 38px);
      }
    }
  </style>
</head>
